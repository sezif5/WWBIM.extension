title:
  ru: "ДГП\nУровни"
  en_us: "DGP\nParameters"

tooltip:
  ru: >-
    Копирование названия уровня из параметра ДГП_Имя уровня в параметр Имя
  en_us: >-
    Fills shared text parameters (ДГП_*) across the active document using deterministic rules keyed by (Category + optional "Группа модели").
    Source parameters can be numeric or text; values are written as project display strings without unit suffixes.
    Writes only when values differ; skips missing targets.

